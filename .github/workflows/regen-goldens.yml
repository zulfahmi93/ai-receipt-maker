name: Regenerate goldens

# Manual-only. Runs the golden tests on Linux x86_64 with the regen env var set,
# captures the produced bytes, and opens a pull request with the diff so the user
# can review before locking the new bytes. PROGRESS.md divergence #23.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why regenerate? (e.g. "first run", "SkiaSharp bump 4.x.y", "fixture change")'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

# Opt every JavaScript action into Node.js 24 ahead of the 2026-06-02 forced
# migration on GitHub-hosted runners. Pinned action versions (checkout@v4,
# setup-dotnet@v4, peter-evans/create-pull-request@v6) ship the Node 24
# runtime once this flag is set; no action-version churn required.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  regen:
    name: Regenerate golden PDF + PNG
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore + build
        run: |
          dotnet restore receipt-toolkit.sln
          dotnet build receipt-toolkit.sln --configuration Release --no-restore

      - name: Regenerate goldens
        env:
          RECEIPT_REGEN_GOLDENS: '1'
          RECEIPT_GOLDEN_OUTPUT_DIR: ${{ github.workspace }}/examples/golden
        run: >
          dotnet test receipt-toolkit.sln
          --configuration Release
          --no-build
          --filter "FullyQualifiedName~ReceiptGeneratorGoldenTests"
          --logger "console;verbosity=normal"

      - name: Show resulting bytes
        run: |
          ls -la examples/golden/
          file examples/golden/*.golden.* || true

      - name: Open pull request with regenerated bytes
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: |
            chore(goldens): regenerate sample_receipt_data goldens (#23)

            Triggered by: ${{ github.actor }}
            Reason: ${{ inputs.reason }}
          title: 'chore(goldens): regenerate sample_receipt_data goldens'
          body: |
            Automated regeneration of `examples/golden/sample_receipt_data.golden.{pdf,png}`.

            **Reason:** ${{ inputs.reason }}
            **Triggered by:** @${{ github.actor }}
            **Runner:** `ubuntu-latest` (x86_64) — locks bytes to the same arch as the CI assert workflow.

            Review the byte-level diff before merging; once merged, every CI run asserts byte-equality against these bytes. Resolves the open part of PROGRESS.md divergence #23.
          branch: chore/regen-goldens
          delete-branch: true
          add-paths: |
            examples/golden/*.golden.pdf
            examples/golden/*.golden.png
