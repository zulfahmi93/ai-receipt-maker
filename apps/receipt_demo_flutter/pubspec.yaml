name: receipt_demo_flutter
description: "Receipt Toolkit demo app — consumes the ASP.NET API to render receipts."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  http: ^1.6.0
  provider: ^6.1.5+1
  share_plus: ^13.1.0
  file_picker: ^12.0.0-beta.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sample_receipt_data.json
